services:
  - type: web
    name: telegram-bot-runner
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /
    autoDeploy: false
    envVars:
      - key: TELEGRAM_POLL_FUNCTION_URL
        sync: false
      - key: LOGO_WORKER_FUNCTION_URL
        sync: false
      - key: BACKEND_AUTH_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: INFO
